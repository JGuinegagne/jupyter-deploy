apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-auth-whoami
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: github-auth-whoami
subjects:
{{- range $org := .Values.orgs }}
{{- range $team := $org.teams }}
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: {{ $.Values.oidcGroupPrefix }}{{ $org.name }}:{{ $team }}
{{- end }}
{{- end }}
