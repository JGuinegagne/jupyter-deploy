{{- range $ns := .Values.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-workspace-binding
  namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-workspace-role
subjects:
{{- range $org := $.Values.orgs }}
{{- range $team := $org.teams }}
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: {{ $.Values.oidcGroupPrefix }}{{ $org.name }}:{{ $team }}
{{- end }}
{{- end }}
{{- end }}
