name: E2E canary (base template)

on:
  schedule:
    # Weekly: Sunday midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  canary:
    uses: ./.github/workflows/pr-e2e-base-fresh.yml
    with:
      oauth-app-num: "3"
    secrets: inherit
